<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#06060b"/>

  <!-- H structure - circuit board style -->
  <!-- Left vertical bar -->
  <line x1="9" y1="7" x2="9" y2="25" stroke="#c8ff00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right vertical bar -->
  <line x1="23" y1="7" x2="23" y2="25" stroke="#c8ff00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Horizontal crossbar - angled for "hyper" energy -->
  <line x1="9" y1="16" x2="23" y2="16" stroke="#c8ff00" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Circuit nodes at connection points -->
  <circle cx="9" cy="16" r="2" fill="#c8ff00"/>
  <circle cx="23" cy="16" r="2" fill="#c8ff00"/>

  <!-- Top terminal nodes -->
  <circle cx="9" cy="7" r="1.5" fill="#c8ff00" opacity="0.6"/>
  <circle cx="23" cy="7" r="1.5" fill="#c8ff00" opacity="0.6"/>

  <!-- Bottom terminal nodes -->
  <circle cx="9" cy="25" r="1.5" fill="#c8ff00" opacity="0.6"/>
  <circle cx="23" cy="25" r="1.5" fill="#c8ff00" opacity="0.6"/>

  <!-- "Hyper" energy dash extending from crossbar -->
  <line x1="25" y1="16" x2="28" y2="13" stroke="#c8ff00" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="28" cy="13" r="1" fill="#c8ff00" opacity="0.4"/>
</svg>
